<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
    <title>Baitul Haque Jame Masjid</title>
  </head>
  <body class="bg-bg">
    <!-- ======== Header Section Starts Here ======== -->

    <header class="py-5 max-width flex justify-between items-center">

        <img
          src="./src/assets/images/logo.png"
          alt="Logo"
          width="150"
          height="50"
          class="object-contain"
        />
      </a>
      <div class="flex items-center gap-5">
        <div class="rounded-md border border-[#20665C]/20 flex overflow-clip">
          <button
            class="px-3 py-1.5 h-full bg-primary text-container font-philosopher"
          >
            Eng
          </button>
          <button class="px-3 py-1.5 h-full bg-transparent text-text">
            বাংলা
          </button>
        </div>
        <a

          class="px-3 py-1.5 bg-primary hover:bg-hover duration-300 text-container font-bold rounded-md font-philosopher"

        </a>
      </div>

    <!-- ======== Header Section Ends Here ======== -->

    <!-- ======== Footer Section Starts Here ======== -->
    <footer>
      <div class="pt-15 pb-10 border-t border-primary/40 max-width flex">
        <div class="flex flex-col gap-6">
          <img
            src="./src/assets/images/logo.png"
            alt="Brand Logo"
            width="150"
            height="58"
            class="object-contain"
          />
          <p class="text-sm text-text">
            আল্লাহর একটি বরকতময় ঘর, যেখানে মানুষ একত্রিত হয় ইবাদতের জন্য, দ্বীনি
            জ্ঞান অর্জনের জন্য, এবং ভালোবাসা ও সহমর্মিতার মাধ্যমে একটি শক্তিশালী
            ও শান্তিপূর্ণ সমাজ গড়ে তোলার জন্য।
          </p>
          <a
            href="/"
            class="py-2 px-4 bg-primary hover:bg-hover duration-300 rounded-md text-container font-bold flex items-center justify-center gap-2"
            ><span>এখনই দান করুন</span
            ><img
              src="./src/assets/images/circle-arrow-right.svg"
              alt="Circle Arrow Right"
              class="size-5"
          /></a>
        </div>
      </div>
      <!-- Copyright Section -->
      <div class="py-2.5 text-center bg-bg border-t border-secondary">
        <p class="text-sm font-philosopher text-primary">
          &copy; 2026 Baitul Haque Jame Masjid. All rights reserved.
